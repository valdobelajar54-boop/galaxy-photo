<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Photo Interactive</title>

<style>

body {
 margin: 0;
 overflow: hidden;
 font-family: Arial;
 background: black;
}

/* Popup foto */
#popup {
 position: fixed;
 top: 50%;
 left: 50%;
 transform: translate(-50%, -50%);
 display: none;
 background: black;
 padding: 10px;
 border-radius: 10px;
}

#popup img {
 max-width: 80vw;
 max-height: 80vh;
}

</style>

</head>
<body>

<div id="popup">
<img id="popupImg">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
<script src="https://threejs.org/examples/js/geometries/TextGeometry.js"></script>

<script>

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 15;

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls =
new THREE.OrbitControls(camera,renderer.domElement);

controls.enableDamping = true;

// Texture Loader
const loader = new THREE.TextureLoader();

// 15 FOTO
const textures = [];

for(let i=1;i<=15;i++){

textures.push(
 loader.load("foto"+i+".png")
);

}

// Galaxy Group
const galaxyGroup = new THREE.Group();
scene.add(galaxyGroup);

const sprites = [];

// SETTINGS FINAL
const totalParticles = 9000;
const radius = 14;
const branches = 6;

for(let i=0;i<totalParticles;i++){

const texture =
textures[Math.floor(Math.random()*15)];

const material =
new THREE.SpriteMaterial({

 map:texture,
 transparent:true,
 opacity:1,
 color:0xff8c00 // orange

});

const sprite =
new THREE.Sprite(material);

const r =
Math.random()*radius;

const branchAngle =
(i%branches)/branches*Math.PI*2;

const spin = r*1.6;

// Posisi menyebar
sprite.position.x =
Math.cos(branchAngle+spin)*r
+ (Math.random()-0.5)*1.8;

sprite.position.y =
(Math.random()-0.5)*5;

sprite.position.z =
Math.sin(branchAngle+spin)*r
+ (Math.random()-0.5)*1.8;

// Ukuran lebih besar
const randomSize =
Math.random()*0.14 + 0.08;

sprite.scale.set(
randomSize,
randomSize,
1
);

galaxyGroup.add(sprite);

sprites.push(sprite);

}

//
// ⭐ BINTANG BACKGROUND
//

const starGeometry =
new THREE.BufferGeometry();

const starCount = 7000;

const starPositions =
new Float32Array(starCount*3);

for(let i=0;i<starCount*3;i++){

starPositions[i] =
(Math.random()-0.5)*100;

}

starGeometry.setAttribute(
'position',
new THREE.BufferAttribute(
starPositions,
3
)
);

const starMaterial =
new THREE.PointsMaterial({

 size:0.05,
 color:0xffffff

});

const stars =
new THREE.Points(
starGeometry,
starMaterial
);

scene.add(stars);

//
// 🎉 TEXT HAPPY BIRTHDAY
//

const fontLoader =
new THREE.FontLoader();

fontLoader.load(
'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',

function(font){

const textGeometry =
new THREE.TextGeometry(

"HAPPY BIRTHDAY",

{
 font: font,
 size: 1,
 height: 0.2,
 curveSegments: 12

}

);

const textMaterial =
new THREE.MeshBasicMaterial({

 color: 0xff8c00 // orange

});

const textMesh =
new THREE.Mesh(
 textGeometry,
 textMaterial
);

// Posisi di atas galaxy
textMesh.position.set(
 -5,
 6,
 0
);

scene.add(textMesh);

}
);

//
// Raycaster (Klik Foto)
//

const raycaster =
new THREE.Raycaster();

const mouse =
new THREE.Vector2();

// Popup
const popup =
document.getElementById("popup");

const popupImg =
document.getElementById("popupImg");

// Klik Foto
window.addEventListener("click",event=>{

mouse.x =
(event.clientX/window.innerWidth)*2-1;

mouse.y =
-(event.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

const intersects =
raycaster.intersectObjects(sprites);

if(intersects.length>0){

popup.style.display="block";

popupImg.src =
intersects[0].object.material.map.image.src;

}

});

// Tutup popup
popup.addEventListener("click",()=>{

popup.style.display="none";

});

// Animation
function animate(){

requestAnimationFrame(animate);

// Rotasi galaxy
galaxyGroup.rotation.y += 0.001;

controls.update();

renderer.render(scene,camera);

}

animate();

// Resize
window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
